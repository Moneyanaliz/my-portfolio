<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Данил — Junior Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #EDEAE3;
    --border: #D8D3C8;
    --text: #1A1814;
    --muted: #7A7368;
    --accent: #2B5CE6;
    --accent-light: #EBF0FF;
    --accent2: #E8430A;
    --green: #1A7A4A;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
  }
  #cursor-ring {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s cubic-bezier(.25,.46,.45,.94), width 0.25s, height 0.25s, opacity 0.2s;
    opacity: 0.5;
  }
  body:has(a:hover) #cursor, body:has(button:hover) #cursor { width: 16px; height: 16px; background: var(--accent2); }
  body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring { width: 52px; height: 52px; opacity: 0.3; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 20px 40px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(247,245,240,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  nav.scrolled { border-color: var(--border); }
  .nav-logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px;
    background: var(--accent);
    transition: width 0.25s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { width: 100%; }
  .nav-cta {
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 18px;
    border: 1.5px solid var(--text);
    background: transparent;
    color: var(--text);
    cursor: none;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: background 0.2s, color 0.2s;
  }
  .nav-cta:hover { background: var(--text); color: var(--bg); }

  /* Hero */
  #hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 120px 40px 80px;
    gap: 60px;
    align-items: center;
    max-width: 1200px;
    margin: 0 auto;
  }
  .hero-left {}
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--green);
    background: #E8F5EE;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .hero-name {
    font-size: clamp(52px, 7vw, 88px);
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .hero-name span { display: block; }
  .hero-name .accent { color: var(--accent); font-weight: 600; }
  .hero-role {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-role::before {
    content: '';
    display: inline-block;
    width: 32px;
    height: 1px;
    background: var(--muted);
  }
  .hero-desc {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 420px;
    margin-bottom: 40px;
  }
  .hero-desc strong { color: var(--text); font-weight: 500; }
  .hero-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn-primary {
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 28px;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s;
    cursor: none;
    border: none;
  }
  .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-ghost {
    font-family: var(--mono);
    font-size: 13px;
    padding: 14px 28px;
    border: 1.5px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: border-color 0.2s, color 0.2s;
    cursor: none;
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  /* Terminal */
  .hero-right {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .terminal {
    background: #1A1814;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.12);
  }
  .terminal-header {
    background: #252219;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #FF5F57; }
  .dot.yellow { background: #FFBD2E; }
  .dot.green { background: #28CA41; }
  .terminal-title {
    font-family: var(--mono);
    font-size: 11px;
    color: #666;
    margin-left: auto;
    letter-spacing: 0.05em;
  }
  .terminal-body {
    padding: 20px 22px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    min-height: 220px;
  }
  .t-line { display: flex; gap: 10px; }
  .t-prompt { color: #2B5CE6; }
  .t-path { color: #1A7A4A; }
  .t-cmd { color: #F7F5F0; }
  .t-output { color: #8B8579; padding-left: 0; }
  .t-output .key { color: #E8860A; }
  .t-output .val { color: #7EC8A4; }
  .t-output .val.blue { color: #7FB3F5; }
  .t-cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: #F7F5F0;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Interactive terminal */
  .terminal-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 22px 16px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .terminal-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #F7F5F0;
    font-family: var(--mono);
    font-size: 13px;
    caret-color: #F7F5F0;
  }
  .terminal-input::placeholder { color: #444; }
  .t-cmd-inline {
    background: rgba(43,92,230,0.25);
    color: #7FB3F5;
    padding: 1px 5px;
    border-radius: 2px;
  }
  .t-error { color: #FF6B6B; }
  .t-success { color: #7EC8A4; }
  .t-history-line {
    display: flex;
    gap: 8px;
    color: #555;
    margin-bottom: 2px;
  }
  .t-history-cmd { color: #F7F5F0; opacity: 0.5; }
  .t-result-block { margin-bottom: 10px; padding-left: 2px; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid var(--border);
  }
  .stat-item {
    padding: 20px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Section common */
  section { padding: 100px 40px; max-width: 1200px; margin: 0 auto; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 60px;
  }
  .section-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .section-title {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .section-title strong { font-weight: 600; }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Skills */
  #skills { border-top: 1px solid var(--border); }
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
  }
  .skill-group {}
  .skill-group-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--accent-light);
  }
  .skill-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    gap: 20px;
  }
  .skill-name { font-size: 14px; font-weight: 400; }
  .skill-bar-wrap {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    max-width: 120px;
    overflow: hidden;
  }
  .skill-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }
  .skill-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    min-width: 50px;
    text-align: right;
  }

  /* Tools */
  .tools-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 40px;
  }
  .tool-chip {
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    color: var(--muted);
    letter-spacing: 0.04em;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    cursor: default;
  }
  .tool-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  /* Projects */
  #projects { border-top: 1px solid var(--border); background: var(--surface); max-width: 100%; padding: 100px 0; }
  #projects .inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .project-card {
    background: var(--bg);
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 0;
    background: var(--accent);
    transition: height 0.3s;
  }
  .project-card:hover { background: var(--accent-light); }
  .project-card:hover::before { height: 100%; }
  .project-card.coming-soon { opacity: 0.5; }
  .project-type {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .project-title {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .project-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    flex: 1;
  }
  .project-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .stack-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    background: var(--surface);
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .project-link {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    margin-top: auto;
    transition: gap 0.2s;
  }
  .project-link:hover { gap: 10px; }
  .project-link .arrow { transition: transform 0.2s; }
  .project-link:hover .arrow { transform: translateX(2px); }
  .badge-soon {
    font-family: var(--mono);
    font-size: 9px;
    padding: 3px 8px;
    background: var(--surface);
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: absolute;
    top: 20px; right: 20px;
  }

  /* About / approach */
  #about { border-top: 1px solid var(--border); }
  .about-grid { display: grid; grid-template-columns: 5fr 4fr; gap: 80px; align-items: start; }
  .about-text p {
    font-size: 17px;
    line-height: 1.75;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .about-text p strong { color: var(--text); font-weight: 500; }
  .about-highlights {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
  }
  .highlight-item {
    padding: 22px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .highlight-item:last-child { border-bottom: none; }
  .h-icon {
    width: 32px; height: 32px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .h-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .h-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Contact */
  #contact { border-top: 1px solid var(--border); }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .contact-left h3 {
    font-size: 32px;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .contact-left h3 strong { font-weight: 600; }
  .contact-left p { color: var(--muted); font-size: 15px; line-height: 1.65; margin-bottom: 32px; }
  .contact-links { display: flex; flex-direction: column; gap: 12px; }
  .contact-link {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  .contact-link:hover { border-color: var(--accent); background: var(--accent-light); }
  .contact-cta { display: flex; flex-direction: column; gap: 16px; justify-content: center; }
  .contact-cta-text { font-size: 16px; color: var(--muted); line-height: 1.65; }
  .contact-cta-btn { text-align: center; }

  .contact-link .cl-icon {
    width: 36px; height: 36px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .cl-text { flex: 1; }
  .cl-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .cl-value { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .cl-arrow { color: var(--accent); opacity: 0; transition: opacity 0.2s, transform 0.2s; }
  .contact-link:hover .cl-arrow { opacity: 1; transform: translateX(4px); }

  /* Contact form area */
    <div class="contact-cta fade-up">
      <p class="contact-cta-text">Предпочитаю живое общение — напишите напрямую, отвечу в течение дня.</p>
      <a href="mailto:danilcodespace@gmail.com?subject=Предложение о работе" class="btn-primary contact-cta-btn">Написать на почту →</a>
      <a href="https://t.me/whlte_collar" target="_blank" class="btn-ghost contact-cta-btn">Написать в Telegram →</a>
    </div>
<div id="cursor-ring"></div>

<section id="skills">
  <div class="section-header fade-up">
    <span class="section-num">01</span>
    <h2 class="section-title"><strong>Навыки</strong> и инструменты</h2>
    <div class="section-line"></div>
  </div>
  <div class="skills-grid">
    <div class="skill-group fade-up">
      <div class="skill-group-title">Разработка</div>
      <div class="skill-item">
        <span class="skill-name">HTML / CSS</span>

<script>
// Cursor
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animCursor() {
  cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  requestAnimationFrame(animCursor);
}
animCursor();

// Nav scroll
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 30);
});

// ─── Terminal Engine ───────────────────────────────────────────────────────
// Логика вынесена в чистые функции — они же тестируются в terminal.test.js

const COMMANDS = {
  help: () => ({
    type: 'table',
    rows: [
      { cmd: 'help',     desc: 'список команд' },
      { cmd: 'whoami',   desc: 'кто я такой' },
      { cmd: 'skills',   desc: 'мои навыки и стек' },
      { cmd: 'projects', desc: 'список проектов' },
      { cmd: 'contact',  desc: 'как связаться' },
      { cmd: 'status',   desc: 'статус поиска работы' },
      { cmd: 'clear',    desc: 'очистить терминал' },
    ]
  }),

  whoami: () => ({
    type: 'kv',
    pairs: [
      { key: 'name',     val: 'Данил',                  blue: false },
      { key: 'role',     val: 'Junior Developer',        blue: true  },
      { key: 'location', val: 'Самара, Россия',          blue: false },
      { key: 'age',      val: '21',                      blue: false },
      { key: 'focus',    val: 'Web · Bots · Automation', blue: true  },
    ]
  }),

  skills: () => ({
    type: 'kv',
    pairs: [
      { key: 'languages', val: '["HTML","CSS","JavaScript","Python","SQL"]', blue: true  },
      { key: 'backend',   val: '["Node.js","REST API","aiogram"]',           blue: true  },
      { key: 'tools',     val: '["Git","Netlify","Postman","Figma"]',         blue: false },
      { key: 'soft',      val: '"Team Lead · Business Analysis · Comms"',    blue: false },
    ]
  }),

  projects: () => ({
    type: 'list',
    items: [
      '📁 portfolio-site  — этот сайт (HTML/CSS/JS)',
      '🤖 tg-bot          — Telegram бот (Python, aiogram) [soon]',
      '🌐 web-app         — веб-приложение (JS, REST API)  [soon]',
    ]
  }),

  contact: () => ({
    type: 'kv',
    pairs: [
      { key: 'email',    val: 'обновляется...',   blue: false },
      { key: 'telegram', val: 'обновляется...',   blue: true  },
      { key: 'phone',    val: '+7 991 512-50-09', blue: false },
    ]
  }),

  status: () => ({
    type: 'text',
    lines: [
      { text: '🟢 Активно ищу работу Junior Developer', color: 'success' },
      { text: 'Офис / гибрид в Самаре или удалённо',    color: 'muted'   },
    ]
  }),

  clear: () => ({ type: 'clear' }),
};

// Чистая функция парсинга — тестируется в Jest
function parseCommand(input) {
  const trimmed = (input || '').trim().toLowerCase();
  if (!trimmed) return { type: 'empty' };
  const [cmd, ...args] = trimmed.split(/\s+/);
  return { cmd, args, raw: trimmed };
}

// Чистая функция получения ответа — тестируется в Jest
function getCommandResponse(cmd) {
  if (!cmd) return { type: 'empty' };
  if (COMMANDS[cmd]) return COMMANDS[cmd]();
  return {
    type: 'error',
    message: `команда не найдена: '${cmd}'. Введи help чтобы увидеть список.`
  };
}

// ─── DOM Rendering ──────────────────────────────────────────────────────────
const termOut  = document.getElementById('terminal-output');
const termInp  = document.getElementById('terminal-input');
const cmdHistory = [];
let historyIdx = -1;

function renderResponse(response) {
  const wrap = document.createElement('div');
  wrap.className = 't-result-block';

  if (response.type === 'clear') {
    termOut.innerHTML = '';
    return;
  }
  if (response.type === 'empty') return;

  if (response.type === 'error') {
    wrap.innerHTML = `<div class="t-output t-error">bash: ${response.message}</div>`;
  } else if (response.type === 'kv') {
    wrap.innerHTML = response.pairs.map(p =>
      `<div class="t-output">
        <span class="key">${p.key}: </span>
        <span class="val${p.blue ? ' blue' : ''}">${p.val}</span>
      </div>`
    ).join('');
  } else if (response.type === 'table') {
    wrap.innerHTML = response.rows.map(r =>
      `<div class="t-output">
        <span class="val blue" style="min-width:80px;display:inline-block">${r.cmd}</span>
        <span class="key">— ${r.desc}</span>
      </div>`
    ).join('');
  } else if (response.type === 'list') {
    wrap.innerHTML = response.items.map(item =>
      `<div class="t-output"><span class="val">${item}</span></div>`
    ).join('');
  } else if (response.type === 'text') {
    wrap.innerHTML = response.lines.map(l => {
      const cls = l.color === 'success' ? 't-success' : l.color === 'muted' ? '' : '';
      return `<div class="t-output ${cls}"><span class="val">${l.text}</span></div>`;
    }).join('');
  }

  termOut.appendChild(wrap);
  termOut.scrollTop = termOut.scrollHeight;
}

function printEcho(raw) {
  const echo = document.createElement('div');
  echo.className = 't-history-line';
  echo.innerHTML = `<span class="t-prompt">❯</span><span class="t-path">~/dev</span><span class="t-history-cmd"> ${raw}</span>`;
  termOut.appendChild(echo);
}

function handleInput(e) {
  if (e.key === 'Enter') {
    const raw = termInp.value.trim();
    termInp.value = '';
    historyIdx = -1;
    if (!raw) return;
    cmdHistory.unshift(raw);
    printEcho(raw);
    const parsed = parseCommand(raw);
    const response = getCommandResponse(parsed.cmd);
    renderResponse(response);
  }

  // История команд — стрелки вверх/вниз
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx < cmdHistory.length - 1) {
      historyIdx++;
      termInp.value = cmdHistory[historyIdx];
    }
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      termInp.value = cmdHistory[historyIdx];
    } else {
      historyIdx = -1;
      termInp.value = '';
    }
  }
}

// Клик в любое место терминала фокусирует инпут
document.querySelector('.terminal').addEventListener('click', () => termInp.focus());
termInp.addEventListener('keydown', handleInput);
termInp.focus();

// Counter animation
function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseInt(el.dataset.count);
    const suffix = el.dataset.suffix !== undefined ? el.dataset.suffix : '';
    let current = 0;
    const step = target / 40;
    const interval = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = Math.round(current) + suffix;
      if (current >= target) clearInterval(interval);
    }, 35);
  });
}
const heroObs = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) { animateCounters(); heroObs.disconnect(); }
}, { threshold: 0.3 });
heroObs.observe(document.querySelector('.stats-row'));

// Scroll fade-up
const fadeObs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.15 });
document.querySelectorAll('.fade-up').forEach(el => fadeObs.observe(el));

// Skill bars on scroll
const skillObs = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) {
    document.querySelectorAll('.skill-bar').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
    skillObs.disconnect();
  }
}, { threshold: 0.2 });
skillObs.observe(document.getElementById('skills'));

// Form submit
async function submitForm() {
  const name    = document.getElementById('fname').value.trim();
  const topic   = document.getElementById('ftopic').value;
  const message = document.getElementById('fmessage').value.trim();

  if (!message || message.length < 5) {
    showFormMsg('Напишите сообщение (минимум 5 символов)', true);
    return;
  }

  const btn = document.querySelector('.btn-send');
  btn.textContent = 'Отправка...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, topic, message })
    });
    const data = await res.json();

    if (data.ok) {
      showFormMsg('✓ Сообщение отправлено — свяжусь с вами в ближайшее время', false);
      document.getElementById('fname').value = '';
      document.getElementById('ftopic').value = '';
      document.getElementById('fmessage').value = '';
    } else {
      showFormMsg(data.errors ? data.errors.join(', ') : 'Ошибка отправки', true);
    }
  } catch (err) {
    showFormMsg('Нет соединения с сервером', true);
  } finally {
    btn.textContent = 'Отправить →';
    btn.disabled = false;
  }
}

function showFormMsg(msg, isError) {
  const el = document.getElementById('form-success');
  el.textContent = msg;
  el.style.display = 'block';
  if (isError) {
    el.style.background = '#FEE2E2';
    el.style.borderColor = '#FCA5A5';
    el.style.color = '#B91C1C';
  } else {
    el.style.background = '';
    el.style.borderColor = '';
    el.style.color = '';
  }
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}
</script>
